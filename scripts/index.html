<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const jsonData = JSON.parse(data);
    const url = jsonData.url;

    if (!url) {
      return JSON.stringify({ error: "No URL provided." });
    }

    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'Accept': 'text/html,application/xhtml+xml,text/plain;q=0.9,*/*;q=0.8'
      }
    });

    if (!response.ok) {
      return JSON.stringify({ error: "Failed to fetch URL. HTTP " + response.status });
    }

    const html = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    var removeSelectors = [
      'script', 'style', 'noscript', 'iframe',
      'nav', 'footer', 'header',
      '.sidebar', '.advertisement', '.ads', '.cookie-banner'
    ];
    removeSelectors.forEach(function(selector) {
      doc.querySelectorAll(selector).forEach(function(el) { el.remove(); });
    });

    var title = '';
    if (doc.querySelector('title')) {
      title = doc.querySelector('title').textContent.trim();
    }

    var textContent = '';
    var mainContent = doc.querySelector('main') || doc.querySelector('article') || doc.querySelector('[role="main"]');
    if (mainContent) {
      textContent = mainContent.innerText || mainContent.textContent;
    } else {
      textContent = doc.body ? (doc.body.innerText || doc.body.textContent) : '';
    }

    textContent = textContent
      .replace(/\t/g, ' ')
      .replace(/[ ]{2,}/g, ' ')
      .replace(/\n{3,}/g, '\n\n')
      .trim();

    var MAX_CHARS = 100000;
    if (textContent.length > MAX_CHARS) {
      textContent = textContent.substring(0, MAX_CHARS) + "\n\n[Content truncated]";
    }

    var result = "Page Title: " + title + "\nURL: " + url + "\n\n" + textContent;
    return JSON.stringify({ result: result });

  } catch (e) {
    console.error(e);
    return JSON.stringify({ error: "Failed to load web page: " + e.message });
  }
};
</script>
</body>
</html>
